anyOf:
  - required: [die]
    properties:
      die:
        required: [area]
  - properties:
      package:
        required:
          - area

required:
  - package

properties:
  amount:
    type: number
  die:
    type: object
    properties:
      area:
        $ref: ./amount.yaml
      technology:
        type: string
        enum:
          - A14
          - N2
          - N3
          - N5
          - N7 EUV
          - N7
          - N10
          - N14
          - N20
          - N28
          - N45
          - N65
          - N90
          - N130
          - N180
          - N250
          - N350
  package:
    type: object
    required:
      - type
    properties:
      area:
        $ref: ./amount.yaml
      type:
        type: string
        enum:
          - BGA
          - WLP
          - SOP
          - QFN
          - DFN
          - QFP
