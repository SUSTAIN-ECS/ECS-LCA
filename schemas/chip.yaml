anyOf:
  - required: [die]
    properties:
      die:
        required: [area]
  - required: [package]
    properties:
      package:
        required:
          - area
          - type
required:
  - type

properties:
  type:
    enum:
      - memory
      - logic
  die:
    type: object
    properties:
      area:
        $ref: ./amount.yaml
      technology:
        type: string
  package:
    type: object
    properties:
      area:
        $ref: ./amount.yaml
      type:
        type: string
        enum:
          - BGA
          - WLP
          - SOP
          - QFN
          - DFN
          - QFP
