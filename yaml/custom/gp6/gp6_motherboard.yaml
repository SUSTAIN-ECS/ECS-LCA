# yaml-language-server: $schema=../../../schemas/custom_activity.yaml

output:
  product: gp6_motherboard
  amount:
    value: 1
    unit: unit

inputs:

  pcb:
    act_name: market for printed wiring board, for surface mounting, Pb free surface
    amount:
      value: 22.6 #considers the full rectangle in which the pcb enters
      unit: cm²

  Google Tensor Application Processor:
    type: chip
    data:
      die:
        area:
          # die area reported in
          # LINK: https://www.techinsights.com/blog/teardown/google-pixel-6-pro-teardown
          value: 108.26
          unit: mm²
        technology: N5
      package:
        type: BGA

  Micron 12 GB LPDDR5 MT62F1536M64D8CH-031 WT:A:
    type: chip
    data:
      type: memory
      die:
        area:
          #MT : Micron Technology
          #62 : Mobile LPDDR5 SDRAM
          #F : Operating Voltage = 1.05V VDD2/0.5V VDDQ
          #1536M64 : 1536 Mb x 64
          #D8 : 8 dies
          #CH : Package Codes
          #-031 : Cycle Time = 310ps WCK
          #WT : –25°C < Tc < +85°C
          #:A design revision

          # LINK: https://www.techinsights.com/blog/micron-d1b-lpddr5x-dram-transistor-characterization-report
          # Gives 37.47 mm2 for a 16Gb die
          # scale this to 96Gb
          value: 224.82
          unit: mm²
      package:
        type: BGA

  Kioxia 128 GB NAND Flash Memory:
    type: chip
    data:
      type: memory
      die:
        area:
          # LINK: https://dl.acm.org/doi/pdf/10.1145/3706594.3727962
          # Gives S = 128 GB / 2.61e-3 / 3 / 162
          # considering 3 bit per cell and 162 layers (because of the generation of the chip)
          value: 100.91
          unit: mm²
        technology: NAND BICS 162 layers
      package:
        type: BGA
  # All chip size have been measured on photos obtained on
  # LINK: https://www.techinsights.com/blog/teardown/google-pixel-6-pro-teardown
